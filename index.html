<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #f5f2ec;
    --fg:        #181818;
    --sub:       #444;
    --muted:     #888;
    --border:    #d9d4cb;
    --hover:     #edeae3;
    --input-bg:  #ffffff;
    --done-dot:  #3a8c33;
    --done-link: #2a6626;

    --step-0:  clamp(15px, 1.8vw, 17px);
    --step-1:  clamp(17px, 2.2vw, 20px);
    --step--1: clamp(13px, 1.5vw, 15px);

    --space-xs: clamp(6px,  1vw,  10px);
    --space-s:  clamp(12px, 2vw,  18px);
    --space-m:  clamp(20px, 3vw,  32px);
    --space-l:  clamp(40px, 6vw,  72px);
    --space-xl: clamp(60px, 9vw, 108px);

    --max-w: 600px;
    --side:  clamp(18px, 5vw, 40px);
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: var(--step-0);
    line-height: 1.65;
    min-height: 100svh;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .wrap {
    width: min(var(--max-w), 100%);
    margin-inline: auto;
    padding: var(--space-l) var(--side) var(--space-xl);
  }

  /* ── HEADER ── */
  header { margin-bottom: var(--space-m); animation: fadeUp .4s ease both; }
  header h1 { font-size: var(--step-1); font-weight: 400; font-style: italic; margin-bottom: 5px; line-height: 1.3; }
  header p  { font-size: var(--step--1); color: var(--sub); line-height: 1.6; }
  header a  { color: var(--sub); text-decoration: none; border-bottom: 1px solid var(--border); transition: color .15s, border-color .15s; }
  header a:hover { color: var(--fg); border-color: var(--sub); }

  /* ── CIRCULAR PROGRESS (fixed bottom-right) ── */
  .progress-wrap {
    position: fixed;
    bottom: clamp(16px, 3vw, 28px);
    right: clamp(16px, 3vw, 28px);
    z-index: 100;
    animation: fadeUp .6s .3s ease both;
  }
  .progress-ring {
    position: relative;
    width: 64px;
    height: 64px;
    cursor: default;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.10));
  }
  .progress-ring svg {
    width: 64px;
    height: 64px;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 3.5;
  }
  .ring-fill {
    fill: none;
    stroke: var(--done-dot);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-dasharray: 163; /* 2π × 26 */
    stroke-dashoffset: 163;
    transition: stroke-dashoffset .9s cubic-bezier(.4,0,.2,1);
  }
  .ring-bg {
    fill: var(--bg);
  }
  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
  }
  .ring-inner .ri-num {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--fg);
    line-height: 1;
  }
  .ring-inner .ri-label {
    font-family: 'EB Garamond', serif;
    font-size: 9px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.3;
    margin-top: 1px;
  }

  /* ── SEARCH ── */
  .search-wrap { position: relative; margin-bottom: var(--space-xs); animation: fadeUp .4s .1s ease both; }
  #search {
    display: block; width: 100%;
    background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 4px; outline: none;
    font-family: 'EB Garamond', Georgia, serif; font-size: var(--step-0); font-style: italic; color: var(--fg);
    padding: clamp(8px,1.5vw,11px) clamp(10px,2vw,14px); padding-right: 52px;
    transition: border-color .15s, box-shadow .15s; -webkit-appearance: none; appearance: none;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--fg); box-shadow: 0 0 0 3px rgba(24,24,24,.07); }
  .search-kbd {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    font-family: 'EB Garamond', serif; font-style: italic; font-size: 12px;
    color: var(--muted); pointer-events: none; transition: opacity .15s;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--space-s); margin-bottom: var(--space-m);
    animation: fadeUp .4s .15s ease both; flex-wrap: wrap;
  }
  .filter-row { display: flex; gap: clamp(12px, 2.5vw, 22px); }
  .filter-btn {
    background: none; border: none;
    font-family: 'EB Garamond', serif; font-size: var(--step--1); font-style: italic;
    color: var(--muted); cursor: pointer; padding: 0 0 2px;
    border-bottom: 1px solid transparent; transition: color .12s, border-color .12s;
    white-space: nowrap; min-height: 36px; display: flex; align-items: center;
  }
  .filter-btn:hover { color: var(--sub); }
  .filter-btn.active { color: var(--fg); border-bottom-color: var(--fg); }



  /* ── REGION HEADING ── */
  .region-heading {
    font-size: var(--step--1); font-style: italic; color: var(--muted);
    letter-spacing: .04em; padding: var(--space-m) 0 var(--space-xs);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 8px;
    list-style: none;
  }
  .rh-count { font-size: 11px; color: var(--border); }

  /* ── LIST ── */
  .country-list { list-style: none; }
  .country-item {
    border-top: 1px solid var(--border);
    padding: clamp(10px,1.8vw,14px) clamp(8px,1.5vw,12px);
    display: grid; grid-template-columns: 16px 1fr;
    gap: clamp(10px,1.8vw,16px); align-items: start;
    border-radius: 4px; margin: 0 calc(-1 * clamp(8px,1.5vw,12px));
    transition: background .12s;
    -webkit-transform: translateZ(0); transform: translateZ(0);
  }
  .country-item:last-child { border-bottom: 1px solid var(--border); }
  .country-item:hover { background: var(--hover); }

  @keyframes flashHighlight {
    0%   { background: rgba(58,140,51,.15); }
    100% { background: transparent; }
  }
  .country-item.highlight { animation: flashHighlight 1.2s ease both; }

  .ci-dot {
    width: 7px; height: 7px; border-radius: 50%;
    border: 1.5px solid #bbb;
    margin-top: calc(var(--step-0) * 0.43); flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .ci-dot.done { background: var(--done-dot); border-color: var(--done-dot); }
  .ci-dot.wip  { background: transparent; border-color: #b07d2e; animation: pulse-wip 2s ease-in-out infinite; }
  @keyframes pulse-wip {
    0%,100% { box-shadow: 0 0 0 2px rgba(176,125,46,.12); }
    50%      { box-shadow: 0 0 0 4px rgba(176,125,46,.28); }
  }

  .ci-body { min-width: 0; }
  .ci-top  { display: flex; align-items: baseline; gap: 7px; flex-wrap: nowrap; }
  .ci-country {
    font-size: var(--step-0); color: var(--fg); line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ci-flag { font-size: clamp(12px,1.6vw,15px); flex-shrink: 0; line-height: 1; }
  .ci-flag img.emoji { height: 1.1em; width: 1.1em; vertical-align: -0.15em; }

  .ci-wip-badge {
    display: inline-block; font-size: 11px; font-style: normal;
    font-family: 'EB Garamond', serif; color: #8a5e1a;
    background: rgba(176,125,46,.1); border: 1px solid rgba(176,125,46,.25);
    border-radius: 3px; padding: 0px 5px 1px; vertical-align: middle;
    margin-left: 4px; line-height: 1.6; white-space: nowrap;
  }

  .ci-book {
    margin-top: 2px; font-size: var(--step--1); color: var(--sub);
    font-style: italic; line-height: 1.55; word-break: break-word; overflow-wrap: break-word;
  }
  .ci-book a {
    color: var(--done-link); text-decoration: none; font-style: normal;
    border-bottom: 1px solid rgba(42,102,38,.25); transition: color .12s, border-color .12s;
    display: inline-block; padding-bottom: 1px;
  }
  .ci-book a:hover { color: #1a4a17; border-color: #1a4a17; }

  /* ── EMPTY ── */
  #empty { display: none; font-size: var(--step-0); font-style: italic; color: var(--muted); padding: var(--space-m) 0; border-top: 1px solid var(--border); }

  /* ── FOOTER ── */
  footer { margin-top: var(--space-l); font-size: var(--step--1); color: var(--muted); font-style: italic; line-height: 2; }
  footer a { color: var(--sub); text-decoration: none; border-bottom: 1px solid var(--border); transition: color .12s, border-color .12s; }
  footer a:hover { color: var(--fg); border-color: var(--sub); }
  footer .sep { margin-inline: 6px; color: var(--border); }

  @media (hover: none) {
    .country-item:hover  { background: transparent; }
    .country-item:active { background: var(--hover); }
  }
  @media (max-width: 360px) {
    .controls { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>

  ["United States","🇺🇸","Americas"],["Vanuatu","🇻🇺","Oceania"],["Vatican City","🇻🇦","Europe"],
  ["Venezuela","🇻🇪","Americas"],["Vietnam","🇻🇳","Asia"],["Yemen","🇾🇪","Asia"],
  ["Zambia","🇿🇲","Africa"],["Zimbabwe","🇿🇼","Africa"]
];

const REGION_ORDER = ["Africa","Americas","Asia","Europe","Oceania"];

const listEl       = document.getElementById('list');
const emptyEl      = document.getElementById('empty');
const searchEl     = document.getElementById('search');
const kbdHint      = document.getElementById('kbdHint');
const progCountEl  = document.getElementById('progCount');
const ringFillEl   = document.getElementById('ringFill');

let currentFilter = 'all';
let currentQuery  = '';

const nodes = countries.map(([name, flag, region]) => {
  const book = books[name];
  const done = !!book && !book.wip;
  const wip  = !!book?.wip;
  const li   = document.createElement('li');
  li.className = 'country-item';

  const bookHtml = book
    ? `<div class="ci-book"><em>${book.title}</em> — ${book.author}${
        book.playlist ? `&nbsp;<a href="${book.playlist}" target="_blank" rel="noopener">listen →</a>` : ''
      }</div>`
    : '';

  li.innerHTML = `
    <div class="ci-dot${done ? ' done' : wip ? ' wip' : ''}"></div>
    <div class="ci-body">
      <div class="ci-top">
        <span class="ci-country">${name}</span>
        <span class="ci-flag" aria-hidden="true">${flag}</span>
        ${wip ? '<span class="ci-wip-badge">currently reading</span>' : ''}
      </div>
      ${bookHtml}
    </div>`;

  li._name   = name.toLowerCase();
  li._done   = done;
  li._wip    = wip;
  li._region = region;
  return li;
});

const doneCount  = nodes.filter(n => n._done).length;
const totalCount = nodes.length;

// ── PROGRESS RING ──
function updateProgress() {
  const circumference = 2 * Math.PI * 26; // 163.36
  const pct = doneCount / totalCount;
  progCountEl.textContent = doneCount;
  requestAnimationFrame(() => {
    ringFillEl.style.strokeDashoffset = circumference * (1 - pct);
  });
}

// ── RENDER ──
function render() {
  const q = currentQuery.toLowerCase().trim();

  const visible = nodes.filter(li => {
    const okFilter =
      currentFilter === 'all' ||
      (currentFilter === 'done' && li._done) ||
      (currentFilter === 'wip'  && li._wip)  ||
      (currentFilter === 'todo' && !li._done && !li._wip);
    return okFilter && (!q || li._name.includes(q));
  });

  listEl.innerHTML = '';
  emptyEl.style.display = visible.length === 0 ? 'block' : 'none';
  if (!visible.length) return;

  const frag = document.createDocumentFragment();
  visible.forEach(li => frag.appendChild(li));
  listEl.appendChild(frag);
}

// ── SEARCH ──
let timer;
searchEl.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => { currentQuery = searchEl.value; render(); }, 70);
});
searchEl.addEventListener('focus',  () => kbdHint.style.opacity = '0');
searchEl.addEventListener('blur',   () => { if (!searchEl.value) kbdHint.style.opacity = '1'; });
searchEl.addEventListener('search', () => { currentQuery = ''; render(); });

// ── FILTER BUTTONS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// ── KEYBOARD ──
const isDesktop = () => !('ontouchstart' in window);
document.addEventListener('keydown', e => {
  if (!isDesktop()) return;
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault(); searchEl.focus(); searchEl.select();
  }
  if (e.key === 'Escape') {
    searchEl.blur();
    if (searchEl.value) { searchEl.value = ''; currentQuery = ''; render(); }
  }
});
if ('ontouchstart' in window) kbdHint.style.display = 'none';

updateProgress();
render();
</script>
</body>
</html>
