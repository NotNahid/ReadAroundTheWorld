<html lang="en">

<script>
  (function() {
    var c = document.createElement('canvas'); c.width = c.height = 1;
    var x = c.getContext('2d'); x.fillText('🇺🇸',-4,4);
    var d = x.getImageData(0,0,1,1).data;
    if (d[0]===d[2]) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/twemoji@latest/dist/twemoji.min.js';
      s.crossOrigin = 'anonymous';
      s.onload = function() {
        var o = {folder:'svg',ext:'.svg',base:'https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/'};
        twemoji.parse(document.body, o);
        new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)twemoji.parse(n,o);});});})
          .observe(document.getElementById('list')||document.body,{childList:true,subtree:true});
      };
      document.head.appendChild(s);
    }
  })();
</script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #f5f2ec;
    --fg:        #181818;
    --sub:       #444;
    --muted:     #999;
    --border:    #d9d4cb;
    --hover:     #edeae3;
    --done-dot:  #3a8c33;
    --done-link: #2a6626;

    --step-0:  clamp(15px, 1.8vw, 17px);
    --step-1:  clamp(17px, 2.2vw, 20px);
    --step--1: clamp(13px, 1.5vw, 15px);

    --space-xs: clamp(6px,  1vw,  10px);
    --space-s:  clamp(12px, 2vw,  18px);
    --space-m:  clamp(20px, 3vw,  32px);
    --space-l:  clamp(40px, 6vw,  72px);
    --space-xl: clamp(60px, 9vw, 108px);

    --max-w: 600px;
    --side:  clamp(18px, 5vw, 40px);
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: var(--step-0);
    line-height: 1.65;
    min-height: 100svh;
  }

  .wrap {
    width: min(var(--max-w), 100%);
    margin-inline: auto;
    padding: var(--space-l) var(--side) var(--space-xl);
  }

  /* ── HEADER ── */
  header { margin-bottom: var(--space-m); }
  header h1 { font-size: var(--step-1); font-weight: 400; font-style: italic; margin-bottom: 4px; line-height: 1.3; }
  header p  { font-size: var(--step--1); color: var(--sub); }
  header a  { color: var(--sub); text-decoration: none; border-bottom: 1px solid var(--border); }
  header a:hover { color: var(--fg); }

  /* ── PROGRESS RING (fixed bottom-right) ── */
  .progress-wrap {
    position: fixed;
    bottom: clamp(16px, 3vw, 24px);
    right: clamp(16px, 3vw, 24px);
    z-index: 100;
  }
  .progress-ring { position: relative; width: 52px; height: 52px; }
  .progress-ring svg { width: 52px; height: 52px; transform: rotate(-90deg); }
  .ring-bg    { fill: var(--bg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 2; }
  .ring-fill  {
    fill: none; stroke: var(--done-dot); stroke-width: 2; stroke-linecap: round;
    stroke-dasharray: 120; stroke-dashoffset: 120;
    transition: stroke-dashoffset 1s ease;
  }
  .ring-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ri-num   { font-size: 13px; font-weight: 500; line-height: 1; }
  .ri-label { font-size: 8px; font-style: italic; color: var(--muted); line-height: 1.2; margin-top: 1px; }

  /* ── SEARCH ── */
  .search-wrap { position: relative; margin-bottom: var(--space-xs); }
  #search {
    display: block; width: 100%;
    background: transparent;
    border: none; border-bottom: 1px solid var(--border);
    outline: none;
    font-family: 'EB Garamond', Georgia, serif; font-size: var(--step-0); font-style: italic; color: var(--fg);
    padding: 7px 48px 7px 0;
    -webkit-appearance: none; appearance: none;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-bottom-color: var(--fg); }
  .search-kbd {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    font-style: italic; font-size: 11px; color: var(--muted); pointer-events: none;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--space-s); margin-top: var(--space-s); margin-bottom: var(--space-m); flex-wrap: wrap;
  }
  .filter-row { display: flex; gap: clamp(12px, 2.5vw, 22px); }
  .filter-btn {
    background: none; border: none;
    font-family: 'EB Garamond', serif; font-size: var(--step--1); font-style: italic;
    color: var(--muted); cursor: pointer; padding: 0 0 1px;
    border-bottom: 1px solid transparent;
    white-space: nowrap; min-height: 32px; display: flex; align-items: center;
  }
  .filter-btn:hover { color: var(--sub); }
  .filter-btn.active { color: var(--fg); border-bottom-color: var(--fg); }

  /* ── LIST ── */
  .country-list { list-style: none; }
  .country-item {
    border-top: 1px solid var(--border);
    padding: clamp(9px,1.6vw,12px) clamp(6px,1.2vw,10px);
    display: grid; grid-template-columns: 14px 1fr;
    gap: clamp(10px,1.8vw,16px); align-items: start;
    border-radius: 3px;
    margin: 0 calc(-1 * clamp(6px,1.2vw,10px));
  }
  .country-item:last-child { border-bottom: 1px solid var(--border); }
  .country-item:hover { background: var(--hover); }

  .ci-dot {
    width: 6px; height: 6px; border-radius: 50%;
    border: 1.5px solid #ccc;
    margin-top: calc(var(--step-0) * 0.44); flex-shrink: 0;
  }
  .ci-dot.done { background: var(--done-dot); border-color: var(--done-dot); }
  .ci-dot.wip  {
    border-color: #b07d2e;
    animation: pulse-wip 2s ease-in-out infinite;
  }
  @keyframes pulse-wip {
    0%,100% { box-shadow: 0 0 0 2px rgba(176,125,46,.1); }
    50%      { box-shadow: 0 0 0 3px rgba(176,125,46,.22); }
  }

  .ci-body { min-width: 0; }
  .ci-top  { display: flex; align-items: baseline; gap: 6px; }
  .ci-country {
    font-size: var(--step-0); line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ci-flag { font-size: clamp(11px,1.5vw,14px); flex-shrink: 0; line-height: 1; }
  .ci-flag img.emoji { height: 1em; width: 1em; vertical-align: -0.1em; }

  .ci-wip-badge {
    font-size: 10px; font-style: normal; color: #8a5e1a;
    border: 1px solid rgba(176,125,46,.3);
    border-radius: 2px; padding: 0 4px; vertical-align: middle;
    margin-left: 3px; line-height: 1.6; white-space: nowrap;
  }
  .ci-book {
    margin-top: 1px; font-size: var(--step--1); color: var(--sub);
    font-style: italic; line-height: 1.5;
  }
  .ci-book a {
    color: var(--done-link); text-decoration: none; font-style: normal;
    border-bottom: 1px solid rgba(42,102,38,.2);
  }
  .ci-book a:hover { color: #1a4a17; }

  /* ── EMPTY ── */
  #empty {
    display: none; font-style: italic; color: var(--muted);
    padding: var(--space-m) 0; border-top: 1px solid var(--border);
  }

  /* ── FOOTER ── */
  footer { margin-top: var(--space-l); font-size: var(--step--1); color: var(--muted); font-style: italic; }
  footer a { color: var(--sub); text-decoration: none; border-bottom: 1px solid var(--border); }
  footer a:hover { color: var(--fg); }
  footer .sep { margin-inline: 5px; }

  @media (hover: none) {
    .country-item:hover  { background: transparent; }
    .country-item:active { background: var(--hover); }
  }
  @media (max-width: 360px) {
    .controls { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>read around the world.</h1>
    <p>one audiobook from every country — chosen by you.
      <a href="https://forms.gle/iFzCNhhu93Z1Pwir9" target="_blank" rel="noopener">submit yours →</a>
    </p>
  </header>

  <div class="progress-wrap" title="reading progress">
    <div class="progress-ring">
      <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-bg"    cx="26" cy="26" r="24"/>
        <circle class="ring-track" cx="26" cy="26" r="19"/>
        <circle class="ring-fill"  cx="26" cy="26" r="19" id="ringFill"/>
      </svg>
      <div class="ring-inner">
        <span class="ri-num"   id="progCount"></span>
        <span class="ri-label">/ 195</span>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <input id="search" type="search" inputmode="search"
      placeholder="search a country…"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <span class="search-kbd" id="kbdHint">press /</span>
  </div>

  <div class="controls">
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="done">read</button>
      <button class="filter-btn" data-filter="wip">reading</button>
      <button class="filter-btn" data-filter="todo">unread</button>
    </div>
  </div>

  <ul class="country-list" id="list"></ul>
  <div id="empty">nothing found.</div>

  <footer>
    <a href="https://forms.gle/iFzCNhhu93Z1Pwir9" target="_blank" rel="noopener">submit a book</a>
    <span class="sep">·</span>
    <a href="https://www.youtube.com/@PustokKit" target="_blank" rel="noopener">@PustokKit on youtube</a>
  </footer>

</div>
<script>
const books = {
  "Afghanistan": { title: "Above Us the Milky Way", author: "Fowzia Karimi", wip: true, 
			playlist: "https://www.youtube.com/playlist?list=PLljZAglIVIZziUqPBWdA6zezxyq8JOSeq" },
  "Angola":      { title: "Whites Can Dance Too",   author: "Kalaf Epalanga",
                   playlist: "https://www.youtube.com/playlist?list=PLljZAglIVIZxjT5rkDHwWe6QmqHETirgw" }
};

const countries = [
  ["Afghanistan","🇦🇫"],["Albania","🇦🇱"],["Algeria","🇩🇿"],["Andorra","🇦🇩"],["Angola","🇦🇴"],
  ["Antigua and Barbuda","🇦🇬"],["Argentina","🇦🇷"],["Armenia","🇦🇲"],["Australia","🇦🇺"],["Austria","🇦🇹"],
  ["Azerbaijan","🇦🇿"],["Bahamas","🇧🇸"],["Bahrain","🇧🇭"],["Bangladesh","🇧🇩"],["Barbados","🇧🇧"],
  ["Belarus","🇧🇾"],["Belgium","🇧🇪"],["Belize","🇧🇿"],["Benin","🇧🇯"],["Bhutan","🇧🇹"],
  ["Bolivia","🇧🇴"],["Bosnia and Herzegovina","🇧🇦"],["Botswana","🇧🇼"],["Brazil","🇧🇷"],["Brunei","🇧🇳"],
  ["Bulgaria","🇧🇬"],["Burkina Faso","🇧🇫"],["Burundi","🇧🇮"],["Cabo Verde","🇨🇻"],["Cambodia","🇰🇭"],
  ["Cameroon","🇨🇲"],["Canada","🇨🇦"],["Central African Republic","🇨🇫"],["Chad","🇹🇩"],["Chile","🇨🇱"],
  ["China","🇨🇳"],["Colombia","🇨🇴"],["Comoros","🇰🇲"],["Congo (Republic)","🇨🇬"],["Congo (DR)","🇨🇩"],
  ["Costa Rica","🇨🇷"],["Croatia","🇭🇷"],["Cuba","🇨🇺"],["Cyprus","🇨🇾"],["Czechia","🇨🇿"],
  ["Denmark","🇩🇰"],["Djibouti","🇩🇯"],["Dominica","🇩🇲"],["Dominican Republic","🇩🇴"],["Ecuador","🇪🇨"],
  ["Egypt","🇪🇬"],["El Salvador","🇸🇻"],["Equatorial Guinea","🇬🇶"],["Eritrea","🇪🇷"],["Estonia","🇪🇪"],
  ["Eswatini","🇸🇿"],["Ethiopia","🇪🇹"],["Fiji","🇫🇯"],["Finland","🇫🇮"],["France","🇫🇷"],
  ["Gabon","🇬🇦"],["Gambia","🇬🇲"],["Georgia","🇬🇪"],["Germany","🇩🇪"],["Ghana","🇬🇭"],
  ["Greece","🇬🇷"],["Grenada","🇬🇩"],["Guatemala","🇬🇹"],["Guinea","🇬🇳"],["Guinea-Bissau","🇬🇼"],
  ["Guyana","🇬🇾"],["Haiti","🇭🇹"],["Honduras","🇭🇳"],["Hungary","🇭🇺"],["Iceland","🇮🇸"],
  ["India","🇮🇳"],["Indonesia","🇮🇩"],["Iran","🇮🇷"],["Iraq","🇮🇶"],["Ireland","🇮🇪"],
  ["Israel","🇮🇱"],["Italy","🇮🇹"],["Jamaica","🇯🇲"],["Japan","🇯🇵"],["Jordan","🇯🇴"],
  ["Kazakhstan","🇰🇿"],["Kenya","🇰🇪"],["Kiribati","🇰🇮"],["Kuwait","🇰🇼"],["Kyrgyzstan","🇰🇬"],
  ["Laos","🇱🇦"],["Latvia","🇱🇻"],["Lebanon","🇱🇧"],["Lesotho","🇱🇸"],["Liberia","🇱🇷"],
  ["Libya","🇱🇾"],["Liechtenstein","🇱🇮"],["Lithuania","🇱🇹"],["Luxembourg","🇱🇺"],["Madagascar","🇲🇬"],
  ["Malawi","🇲🇼"],["Malaysia","🇲🇾"],["Maldives","🇲🇻"],["Mali","🇲🇱"],["Malta","🇲🇹"],
  ["Marshall Islands","🇲🇭"],["Mauritania","🇲🇷"],["Mauritius","🇲🇺"],["Mexico","🇲🇽"],["Micronesia","🇫🇲"],
  ["Moldova","🇲🇩"],["Monaco","🇲🇨"],["Mongolia","🇲🇳"],["Montenegro","🇲🇪"],["Morocco","🇲🇦"],
  ["Mozambique","🇲🇿"],["Myanmar","🇲🇲"],["Namibia","🇳🇦"],["Nauru","🇳🇷"],["Nepal","🇳🇵"],
  ["Netherlands","🇳🇱"],["New Zealand","🇳🇿"],["Nicaragua","🇳🇮"],["Niger","🇳🇪"],["Nigeria","🇳🇬"],
  ["North Korea","🇰🇵"],["North Macedonia","🇲🇰"],["Norway","🇳🇴"],["Oman","🇴🇲"],["Pakistan","🇵🇰"],
  ["Palau","🇵🇼"],["Palestine","🇵🇸"],["Panama","🇵🇦"],["Papua New Guinea","🇵🇬"],["Paraguay","🇵🇾"],
  ["Peru","🇵🇪"],["Philippines","🇵🇭"],["Poland","🇵🇱"],["Portugal","🇵🇹"],["Qatar","🇶🇦"],
  ["Romania","🇷🇴"],["Russia","🇷🇺"],["Rwanda","🇷🇼"],["Saint Kitts and Nevis","🇰🇳"],["Saint Lucia","🇱🇨"],
  ["Saint Vincent and the Grenadines","🇻🇨"],["Samoa","🇼🇸"],["San Marino","🇸🇲"],["Sao Tome and Principe","🇸🇹"],
  ["Saudi Arabia","🇸🇦"],["Senegal","🇸🇳"],["Serbia","🇷🇸"],["Seychelles","🇸🇨"],["Sierra Leone","🇸🇱"],
  ["Singapore","🇸🇬"],["Slovakia","🇸🇰"],["Slovenia","🇸🇮"],["Solomon Islands","🇸🇧"],["Somalia","🇸🇴"],
  ["South Africa","🇿🇦"],["South Korea","🇰🇷"],["South Sudan","🇸🇸"],["Spain","🇪🇸"],["Sri Lanka","🇱🇰"],
  ["Sudan","🇸🇩"],["Suriname","🇸🇷"],["Sweden","🇸🇪"],["Switzerland","🇨🇭"],["Syria","🇸🇾"],
  ["Tajikistan","🇹🇯"],["Tanzania","🇹🇿"],["Thailand","🇹🇭"],["Timor-Leste","🇹🇱"],["Togo","🇹🇬"],
  ["Tonga","🇹🇴"],["Trinidad and Tobago","🇹🇹"],["Tunisia","🇹🇳"],["Turkey","🇹🇷"],["Turkmenistan","🇹🇲"],
  ["Tuvalu","🇹🇻"],["Uganda","🇺🇬"],["Ukraine","🇺🇦"],["United Arab Emirates","🇦🇪"],["United Kingdom","🇬🇧"],
  ["United States","🇺🇸"],["Vanuatu","🇻🇺"],["Vatican City","🇻🇦"],["Venezuela","🇻🇪"],["Vietnam","🇻🇳"],
  ["Yemen","🇾🇪"],["Zambia","🇿🇲"],["Zimbabwe","🇿🇼"]
];

const listEl      = document.getElementById('list');
const emptyEl     = document.getElementById('empty');
const searchEl    = document.getElementById('search');
const kbdHint     = document.getElementById('kbdHint');
const progCountEl = document.getElementById('progCount');
const ringFillEl  = document.getElementById('ringFill');

let currentFilter = 'all';
let currentQuery  = '';

const nodes = countries.map(([name, flag]) => {
  const book = books[name];
  const done = !!book && !book.wip;
  const wip  = !!book?.wip;
  const li   = document.createElement('li');
  li.className = 'country-item';

  const bookHtml = book
    ? `<div class="ci-book"><em>${book.title}</em> — ${book.author}${
        book.playlist ? `&nbsp;<a href="${book.playlist}" target="_blank" rel="noopener">listen →</a>` : ''
      }</div>`
    : '';

  li.innerHTML = `
    <div class="ci-dot${done ? ' done' : wip ? ' wip' : ''}"></div>
    <div class="ci-body">
      <div class="ci-top">
        <span class="ci-country">${name}</span>
        <span class="ci-flag" aria-hidden="true">${flag}</span>
        ${wip ? '<span class="ci-wip-badge">currently reading</span>' : ''}
      </div>
      ${bookHtml}
    </div>`;

  li._name = name.toLowerCase();
  li._done = done;
  li._wip  = wip;
  return li;
});

const doneCount  = nodes.filter(n => n._done).length;
const totalCount = nodes.length;

function updateProgress() {
  const circ = 2 * Math.PI * 19;
  progCountEl.textContent = doneCount;
  requestAnimationFrame(() => {
    ringFillEl.style.strokeDasharray  = circ;
    ringFillEl.style.strokeDashoffset = circ * (1 - doneCount / totalCount);
  });
}

function render() {
  const q = currentQuery.toLowerCase().trim();
  const visible = nodes.filter(li => {
    const ok =
      currentFilter === 'all' ||
      (currentFilter === 'done' && li._done) ||
      (currentFilter === 'wip'  && li._wip)  ||
      (currentFilter === 'todo' && !li._done && !li._wip);
    return ok && (!q || li._name.includes(q));
  });

  listEl.innerHTML = '';
  emptyEl.style.display = visible.length === 0 ? 'block' : 'none';
  if (!visible.length) return;

  const frag = document.createDocumentFragment();
  visible.forEach(li => frag.appendChild(li));
  listEl.appendChild(frag);
}

let timer;
searchEl.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => { currentQuery = searchEl.value; render(); }, 70);
});
searchEl.addEventListener('focus',  () => kbdHint.style.opacity = '0');
searchEl.addEventListener('blur',   () => { if (!searchEl.value) kbdHint.style.opacity = '1'; });
searchEl.addEventListener('search', () => { currentQuery = ''; render(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

const isDesktop = () => !('ontouchstart' in window);
document.addEventListener('keydown', e => {
  if (!isDesktop()) return;
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault(); searchEl.focus(); searchEl.select();
  }
  if (e.key === 'Escape') {
    searchEl.blur();
    if (searchEl.value) { searchEl.value = ''; currentQuery = ''; render(); }
  }
});
if ('ontouchstart' in window) kbdHint.style.display = 'none';

updateProgress();
render();
</script>
</body>
</html>
